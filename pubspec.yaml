name: rua_mvp
description: MVP para o projeto Rua - Cadastro de ocorrências e parceiros
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ==== Plugins principais ====
  geolocator: ^9.0.2
  image_picker: ^1.1.0
  image_picker_for_web: ^3.0.2
  url_launcher: ^6.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  share_plus: ^10.0.2
  intl: ^0.19.0

  # ==== Mapa (seletor de posição) ====
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # (opcionais já usados no projeto)
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo_ruaviva.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo_ruaviva.png
